name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Измените на вашу основную ветку если она называется иначе

  # Позволяет запускать workflow вручную из вкладки Actions
  workflow_dispatch:

# Устанавливаем разрешения для GITHUB_TOKEN чтобы разрешить деплой на Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Разрешаем только один concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf site
          mkdir -p site

          cp ./*.html site/
          cp ./style.css site/

          # Assets live under /public in this repo
          cp -R ./public ./site/public

          # Prevent GitHub Pages from enabling Jekyll
          touch site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
